name: "Setup Python Environment"
description: "Set up uv with a managed Python and install project dependencies (lockfile-true)"

inputs:
  python-version:
    description: "Python version"
    required: true
    default: "3.13"
  install-args:
    description: "Extra args for uv sync (e.g., --group ci)"
    required: false
    default: "--frozen"

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v9.0.0
      with:
        python-version: ${{ inputs.python-version }}
        enable-cache: true
        cache-suffix: ${{ inputs.python-version }}

    - name: Install Python dependencies
      shell: bash
      run: |
        uv --version
        uv sync ${{ inputs.install-args }}
